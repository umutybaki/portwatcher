<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Rect Background (macOS Style) -->
  <rect width="512" height="512" rx="114" fill="url(#mainGradient)"/>
  
  <!-- Stylized Radar / Scan UI -->
  <circle cx="256" cy="256" r="160" stroke="white" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="256" cy="256" r="120" stroke="white" stroke-width="2" stroke-opacity="0.2"/>
  <circle cx="256" cy="256" r="80" stroke="white" stroke-width="2" stroke-opacity="0.1"/>
  
  <!-- Port Symbol (The "Watcher" Sight) -->
  <circle cx="256" cy="256" r="60" stroke="white" stroke-width="28" stroke-linecap="round"/>
  
  <!-- Radar Sweep -->
  <path d="M256 96C256 96 345.545 106.326 401.737 162.518C457.929 218.71 468.255 308.255 468.255 308.255" stroke="white" stroke-width="12" stroke-linecap="round" stroke-opacity="0.5"/>
  
  <!-- The 'Kill' Cross / Focus Point -->
  <path d="M256 160V220M256 352V292M292 256H352M160 256H220" stroke="white" stroke-width="24" stroke-linecap="round"/>
  
  <!-- Small Notification/Active Indicator -->
  <circle cx="380" cy="132" r="28" fill="#FF3B30" stroke="white" stroke-width="8"/>

  <defs>
    <linearGradient id="mainGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>
</svg>
